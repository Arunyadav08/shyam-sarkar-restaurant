<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shyam Sarkar Restaurant</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:#ff4d00;
padding:20px;
text-align:center;
}

header h1{
margin:0;
font-size:35px;
}

header p{
margin:5px;
font-size:18px;
}

.hero{
text-align:center;
padding:60px 20px;
background:url('https://images.unsplash.com/photo-1550547660-d9450f859349') center/cover;
}

.hero h2{
font-size:40px;
}

.section{
padding:40px 20px;
text-align:center;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#222;
padding:20px;
border-radius:10px;
}

.owner img{
width:150px;
border-radius:50%;
}

.map iframe{
width:100%;
height:300px;
border:0;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-size:18px;
}

footer{
background:#000;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>
<h1>SHYAM SARKAR RESTAURANT</h1>
<p>Yadav Tea Stall</p>
</header>

<section class="hero">
<h2>Best Fast Food in Town</h2>
<p>Burger • Pizza • Tea • Snacks</p>
</section>

<section class="section">
<h2>Our Menu</h2>

<div class="menu">

<div class="card">
<h3>Burger</h3>
<p>₹60</p>
</div>

<div class="card">
<h3>Pizza</h3>
<p>₹120</p>
</div>

<div class="card">
<h3>Tea</h3>
<p>₹20</p>
</div>

<div class="card">
<h3>Sandwich</h3>
<p>₹50</p>
</div>

</div>
</section>

<section class="section owner">

<h2>Owner</h2>

<img src="owner.jpg">

<p>Welcome to our restaurant. Enjoy fresh fast food and tea.</p>

</section>

<section class="section map">

<h2>Find Us</h2>

<iframe src="https://maps.google.com/maps?q=panipat&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

</section>

<a class="whatsapp" href="https://wa.me/919999999999">Order on WhatsApp</a>

<footer>

<p>© 2026 Shyam Sarkar Restaurant</p>

</footer>

</body>
</html>
